train{
    expname = exp
    dataset_class = data_loader.dataset_APS.SceneDatasetDemo
    train_runner_class = run.trainer_aps2.PlanarSplatTrainRunner
    max_total_iters = 5000
    coarse_stage_ite = 1000
    split_start_ite = 1000
    plot_freq = 2500
    process_plane_freq = 1000
    check_plane_vis_freq = 1000
}
dataset{ 
    dataset_name = APS
    tag = APS
    init_sphere_radius = 3
    voxel_length = 0.02
    sdf_trunc = 0.08
    depth_trunc = 6.0
    max_depth = 20.0
}
plane_model{
    plane_model_class = net.net_planarSplatting.PlanarSplat_Network
    plane_loss{
        weight_mono_normal = 5.0
        weight_mono_depth = 2.0
    }
    # ==========  training setting
    init_plane_num = 2000
    fix_rot_normal = False
    fix_rot_xy = False
    fix_radii = False
    fix_center = False
    # =========  plane lr
    lr_radii = 0.002
    lr_center = 0.002
    lr_rot_normal = 0.002
    lr_rot_xy = 0.002
    # ==========  plane splatting setting
    RBF_type = rectangle
    RBF_weight_change_type = increase  
    # ==========  plane radii
    radii_dir_type = double  
    radii_init = 0.1
    radii_max_list = [0.5, 2]
    radii_min_list = [0.02, 0.02]
    radii_milestone_list = [0, 1000]
    # ========= plane split
    split_thres = 0.10  # planes with >0.10 average gradient magnitude will split
}
merge_coarse{
    normal_angle_thresh = 25.0
    dist_thresh = 0.1
    mesh_dist_thresh = 0.01
    mesh_dist_thresh_2 = 0.02
    space_resolution = 0.02
    voxel_size = 0.015
    trim_enabled = True
}
merge_fine{
    normal_angle_thresh = 15.0
    dist_thresh = 0.1
    mesh_dist_thresh = 0.01
    mesh_dist_thresh_2 = 0.02
    space_resolution = 0.02
    voxel_size = 0.015
    trim_enabled = True
}
ablation{
    process_mesh = True
    split_n_prune = True
}