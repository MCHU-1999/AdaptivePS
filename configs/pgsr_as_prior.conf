    # fc_normal_angle_thresh = 25
    # fc_dist_thresh = 0.2
    # floor_height = -1
    # ceiling_height = -1
}
merge_fine{
    normal_angle_thresh = 5.0
    dist_thresh = 0.05
    mesh_dist_thresh = 0.01
    mesh_dist_thresh_2 = 0.02
    space_resolution = 0.02
    voxel_size = 0.015
    bg_trim_enabled = False
    bg_trim_max_bg_ratio = 0.4
